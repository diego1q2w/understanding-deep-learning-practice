name: resnet20_experiment
seed: 42
device: null

model:
  name: resnet20
  net_type: post  # Default, will be overridden
  num_classes: 10

optimizer:
  name: sgd
  lr: 0.1
  momentum: 0.9
  weight_decay: 0.0001

scheduler:
  name: step
  step_size: 20
  gamma: 0.1

training:
  epochs: 100
  batch_size: 32
  enable_gradient_tracking: true

data:
  name: cifar10
  root: ./data
  num_workers: 2
  augmentation: true